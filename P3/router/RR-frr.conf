frr version 8
service integrated-vtysh-config

hostname RR

log syslog informational
router ospf
 ospf router-id 1.1.1.10
 network 10.0.0.0/24 area 0
 network 1.1.1.10/32 area 0
!

router bgp 65000
 bgp router-id 1.1.1.10
 bgp log-neighbor-changes

 neighbor LEAFS peer-group
 neighbor LEAFS remote-as 65000
 neighbor LEAFS update-source 1.1.1.10

 neighbor 1.1.1.1 peer-group LEAFS
 neighbor 1.1.1.2 peer-group LEAFS
 neighbor 1.1.1.3 peer-group LEAFS

 address-family l2vpn evpn
  neighbor LEAFS activate

  neighbor 1.1.1.1 route-reflector-client
  neighbor 1.1.1.2 route-reflector-client
  neighbor 1.1.1.3 route-reflector-client

 exit-address-family
!
